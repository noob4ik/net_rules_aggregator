name: Release

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  docker:
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          out="net_rules_aggregator_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "$out" ./cmd/main.go
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: net_rules_aggregator_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  generate-lists:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binary
        run: go build -ldflags="-s -w" -o net_rules_aggregator ./cmd/main.go
      - name: Generate lists in all formats
        run: |
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "SHA=$SHA" >> "$GITHUB_ENV"
          ./net_rules_aggregator -i input.example.yaml -f keenetic -o "routes_keenetic_${SHA}.txt"
          ./net_rules_aggregator --skip-resolve -f amnezia -o "amnezia_sites_${SHA}.json"
          ./net_rules_aggregator --skip-resolve -f cidr    -o "routes_cidr_${SHA}.txt"
          ./net_rules_aggregator --skip-resolve -f yaml    -o "routes_yaml_${SHA}.yaml"
      - uses: actions/upload-artifact@v7
        with:
          name: lists
          path: |
            routes_keenetic_${{ env.SHA }}.txt
            amnezia_sites_${{ env.SHA }}.json
            routes_cidr_${{ env.SHA }}.txt
            routes_yaml_${{ env.SHA }}.yaml
          if-no-files-found: error

  release-latest:
    needs: generate-lists
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: lists
          path: dist
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest (master)
          prerelease: true
          make_latest: false
          files: dist/*

  release-tag:
    needs: [test, docker, build, generate-lists]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
